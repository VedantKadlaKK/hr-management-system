<div class="leave-form">
  <div class="page-header">
    <h1>New Leave Request</h1>
  </div>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-grid">

          <mat-form-field appearance="outline" *ngIf="authService.canApproveLeaves(); else employeeSelf">
            <mat-label>Employee</mat-label>
            <mat-select formControlName="employeeId">
              <mat-option *ngFor="let e of employees" [value]="e.id">
                {{ e.firstName }} {{ e.lastName }}
              </mat-option>
            </mat-select>
          </mat-form-field>

          <ng-template #employeeSelf>
            <mat-form-field appearance="outline">
              <mat-label>Employee</mat-label>
              <input matInput [value]="currentEmployee ? currentEmployee.firstName + ' ' + currentEmployee.lastName : 'Loading...'" disabled />
            </mat-form-field>
          </ng-template>

          <mat-form-field appearance="outline">
            <mat-label>Leave Type</mat-label>
            <mat-select formControlName="leaveType">
              <mat-option *ngFor="let t of leaveTypes" [value]="t.value">
                {{ t.label }}
              </mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Start Date</mat-label>
            <input matInput [matDatepicker]="startPicker" formControlName="startDate" />
            <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
            <mat-datepicker #startPicker></mat-datepicker>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>End Date</mat-label>
            <input matInput [matDatepicker]="endPicker" formControlName="endDate" />
            <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
            <mat-datepicker #endPicker></mat-datepicker>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Reason</mat-label>
            <textarea matInput formControlName="reason" rows="4"></textarea>
          </mat-form-field>

        </div>

        <div class="form-actions">
          <button mat-button type="button" routerLink="/leaves">
            <mat-icon>arrow_back</mat-icon> Cancel
          </button>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
            <mat-icon>send</mat-icon> Submit Request
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
